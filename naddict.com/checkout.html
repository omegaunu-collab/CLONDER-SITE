<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — Naddict</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, sans-serif;
      margin: 0;
      background: #f5f5f0;
      color: #020218;
      min-height: 100vh;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    h1 { font-size: 1.75rem; margin: 0 0 0.5rem; }
    .back { color: #34cfc7; text-decoration: none; font-weight: 500; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.35rem; }
    input, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .lines { border-top: 1px solid #eee; margin: 1rem 0; padding-top: 1rem; }
    .line { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9375rem; }
    .total { font-size: 1.25rem; font-weight: 600; margin-top: 1rem; }
    button[type="submit"] {
      width: 100%;
      margin-top: 1.25rem;
      padding: 1rem;
      background: #34cfc7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #b91c1c; font-size: 0.875rem; margin-top: 0.5rem; }
    .success { text-align: center; padding: 2rem 0; }
    .success h2 { color: #065f46; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" class="back">← Continue shopping</a>
    <h1>Checkout</h1>
    <p style="color:#666;margin:0;">Complete your order. We will confirm by email.</p>

    <div id="checkout-form-wrap" class="card">
      <form id="checkout-form">
        <label for="fullName">Full name</label>
        <input id="fullName" name="fullName" required autocomplete="name">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email">

        <label for="notes">Order notes (optional)</label>
        <textarea id="notes" name="notes" rows="3"></textarea>

        <div class="lines" id="order-lines"></div>
        <div class="total" id="order-total"></div>
        <p id="checkout-error" class="error" hidden></p>
        <button type="submit" id="submit-btn">Place order</button>
      </form>
    </div>

    <div id="checkout-success" class="card success" hidden>
      <h2>Thank you!</h2>
      <p>Your order has been received. Order reference: <strong id="order-id"></strong></p>
      <a href="index.html" class="back">Back to shop</a>
    </div>
  </div>

  <script src="js/naddict-shop.js"></script>
  <script>
    (async function () {
      await NaddictShop.init();
      const items = NaddictShop.getItems();
      const linesEl = document.getElementById('order-lines');
      const totalEl = document.getElementById('order-total');

      if (!items.length) {
        linesEl.innerHTML = '<p>Your cart is empty.</p>';
        document.getElementById('submit-btn').disabled = true;
        return;
      }

      items.forEach((line) => {
        const row = document.createElement('div');
        row.className = 'line';
        row.innerHTML =
          '<span>' + line.name + ' × ' + line.quantity + '</span>' +
          '<span>' + NaddictShop.formatMoney(NaddictShop.centsToPounds(line.unit_price_cents * line.quantity)) + '</span>';
        linesEl.appendChild(row);
      });

      totalEl.textContent = 'Total: ' + NaddictShop.formatMoney(NaddictShop.centsToPounds(NaddictShop.getSubtotalCents()));

      document.getElementById('checkout-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const errEl = document.getElementById('checkout-error');
        errEl.hidden = true;
        btn.disabled = true;
        btn.textContent = 'Placing order…';

        try {
          const result = await NaddictShop.submitOrder({
            email: document.getElementById('email').value,
            fullName: document.getElementById('fullName').value,
            notes: document.getElementById('notes').value,
          });
          document.getElementById('checkout-form-wrap').hidden = true;
          document.getElementById('checkout-success').hidden = false;
          document.getElementById('order-id').textContent = result.orderId;
        } catch (err) {
          errEl.textContent = err.message || 'Something went wrong.';
          errEl.hidden = false;
          btn.disabled = false;
          btn.textContent = 'Place order';
        }
      });
    })();
  </script>
</body>
</html>
